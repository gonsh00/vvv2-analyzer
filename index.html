<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VVV2 Analyzer - Final Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007aff;
            --primary-red: #ff3b30;
            --soft-bg: rgba(255, 255, 255, 1);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --text-dark: #222222;
            --text-light: #888888;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            margin: 0; background-color: #f2f2f7; color: var(--text-dark);
            min-height: 100vh; display: flex; justify-content: center; padding: 0;
        }

        /* Password Gate */
        #password-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .gate-card {
            background: white; padding: 40px 30px; border-radius: 24px; text-align: center;
            width: 85%; max-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .gate-title { font-weight: 900; font-size: 20px; margin-bottom: 20px; color: #333; }
        .gate-input {
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee;
            margin-bottom: 20px; box-sizing: border-box; text-align: center; font-size: 16px;
        }
        .gate-btn {
            background: #000; color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer;
        }

        /* Wrapper */
        .wrapper {
            width: 100%; max-width: 480px; background: white; min-height: 100vh;
            box-sizing: border-box; display: none; /* Initially hidden */
        }

        .header-banner {
            width: 100%; height: 160px;
            background-image: url('07.image/1104-22-02.jpg');
            background-size: cover; background-position: center;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        .header-banner::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4);
        }
        .header-content { position: relative; z-index: 10; text-align: center; }
        .header-content h1 { color: white; font-weight: 900; font-size: 32px; margin: 0; }
        .header-content p { color: rgba(255,255,255,0.8); font-size: 10px; letter-spacing: 3px; font-weight: 700; margin: 0; }

        .live-score-bar {
            background-color: #f8f8f8; padding: 15px 24px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 100;
        }
        .live-score-value { font-size: 24px; font-weight: 900; }

        .main-content { padding: 24px; }
        .main-input-group { margin-bottom: 30px; }
        .input-label { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: block; color: var(--text-light); }
        input[type="number"] {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #efefef;
            background: #fcfcfc; font-size: 24px; font-weight: 900; text-align: center; box-sizing: border-box;
        }

        .controls { display: flex; gap: 10px; margin-bottom: 24px; }
        .mode-toggle {
            flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px; background: #f0f0f0;
        }
        .mode-toggle.active-plus { background: var(--primary-blue); color: white; }
        .mode-toggle.active-minus { background: var(--primary-red); color: white; }
        .reset-btn { padding: 12px 15px; border-radius: 12px; border: 1px solid #ddd; background: #fff; color: #aaa; }

        .counter-section { margin-bottom: 30px; }
        .section-header { margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .section-title { font-size: 14px; font-weight: 900; letter-spacing: 1px; }

        .counter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .counter-card {
            background: #fff; border-radius: 16px; padding: 16px 10px; text-align: center;
            border: 1px solid #f0f0f0; box-shadow: 0 2px 8px rgba(0,0,0,0.03); cursor: pointer;
        }
        .title-blue { color: var(--primary-blue); }
        .title-red { color: var(--primary-red); }
        .card-label { font-size: 10px; font-weight: 700; margin-bottom: 8px; color: #999; }
        .card-value { font-size: 28px; font-weight: 900; }

        .push-container { margin: 40px 0; display: flex; justify-content: center; }
        .push-btn {
            width: 140px; height: 140px; background: #fff; border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 6px solid #f9f9f9;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .push-inner { font-weight: 900; font-size: 32px; color: var(--primary-red); }

        .result-panel { text-align: center; padding: 40px 20px; background: #fff; border-top: 2px solid #f0f0f0; display: none; }
        .expect-value { font-size: 80px; font-weight: 900; margin: 10px 0; line-height: 1; }
        .rainbow-text {
            background: linear-gradient(to right, #ff3b30, #ff9500, #ffcc00, #4cd964, #007aff, #5856d6, #ff2d55);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shine 2s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body>

<div id="password-gate">
    <div class="gate-card">
        <div class="gate-title">ENTER PASSWORD</div>
        <input type="text" id="pass-input" class="gate-input" placeholder="パスワードを入力">
        <button class="gate-btn" onclick="checkPassword()">認証して開始</button>
        <div id="pass-error" style="color:red; font-size:12px; margin-top:10px; display:none;">パスワードが違います</div>
    </div>
</div>

<div class="wrapper" id="main-content">
    <div class="header-banner"><div class="header-content"><h1>VVV2 ANALYZER</h1><p>STATISTICAL ESTIMATION MODEL</p></div></div>
    <div class="live-score-bar">
        <div style="font-size:10px; font-weight:900; color:#888;">CURRENT SCORE</div>
        <div class="live-score-value"><span id="live-pts">0</span><small style="font-size:12px; margin-left:4px;">pt</small></div>
    </div>
    <div class="main-content">
        <div class="main-input-group"><label class="input-label">累計回転数</label><input type="number" id="games" value="0" inputmode="numeric"></div>
        <div class="controls">
            <button id="toggle-mode" class="mode-toggle active-plus" onclick="toggleMode()"><span id="mode-icon">＋</span> <span id="mode-text">加算モード</span></button>
            <button class="reset-btn" onclick="allReset()">Reset</button>
        </div>
        <div class="counter-section">
            <div class="section-header"><div class="section-title title-blue">加点要素 (BONUS)</div></div>
            <div class="counter-grid">
                <div class="counter-card" onclick="updateVal('ult')"><div class="card-label">究極（3連ドライブ）</div><div class="card-value title-blue" id="val-ult">0</div></div>
                <div class="counter-card" onclick="updateVal('r10')"><div class="card-label">10連突破</div><div class="card-value title-blue" id="val-r10">0</div></div>
                <div class="counter-card" onclick="updateVal('d11')"><div class="card-label">RUSH11- ドライブ</div><div class="card-value title-blue" id="val-d11">0</div></div>
                <div class="counter-card" onclick="updateVal('d4')"><div class="card-label">RUSH4-10 ドライブ</div><div class="card-value title-blue" id="val-d4">0</div></div>
                <div class="counter-card" onclick="updateVal('d2')"><div class="card-label">RUSH1-3 ドライブ</div><div class="card-value title-blue" id="val-d2">0</div></div>
                <div class="counter-card" onclick="updateVal('direct')"><div class="card-label">直撃AT</div><div class="card-value title-blue" id="val-direct">0</div></div>
            </div>
        </div>
        <div class="counter-section">
            <div class="section-header"><div class="section-title title-red">減点要素 (NEGATIVE)</div></div>
            <div class="counter-grid">
                <div class="counter-card" onclick="updateVal('drop_d')"><div class="card-label">ドライブ直後転落</div><div class="card-value title-red" id="val-drop_d">0</div></div>
                <div class="counter-card" onclick="updateVal('drop_9')"><div class="card-label">RUSH9転落</div><div class="card-value title-red" id="val-drop_9">0</div></div>
                <div class="counter-card" onclick="updateVal('short')"><div class="card-label">RUSH3連以内終了</div><div class="card-value title-red" id="val-short">0</div></div>
                <div class="counter-card" onclick="updateVal('ceil')"><div class="card-label">天井到達</div><div class="card-value title-red" id="val-ceil">0</div></div>
            </div>
        </div>
        <div class="push-container"><button class="push-btn" onclick="judge()"><div class="push-inner">PUSH</div></button></div>
    </div>
    <div id="result-panel" class="result-panel">
        <div style="font-weight:700; font-size:14px; color:#888;">高設定期待度</div>
        <div class="expect-value" id="res-pct">0%</div>
        <div id="res-msg" style="font-weight:900; font-size:18px;">-</div>
    </div>
</div>

<script>
    const SECRET = 'mumuchan';
    // Base statistical milestones
    const MILESTONES = [
        { g: 1000, h: 0.1, l: 0.05 }, { g: 3000, h: 0.4, l: 0.1 }, { g: 5000, h: 0.6, l: 0.2 }, { g: 8000, h: 0.8, l: 0.3 }
    ];

    let currentMode = 1;
    const values = { ult: 0, r10: 0, d11: 0, d4: 0, d2: 0, direct: 0, drop_d: 0, drop_9: 0, short: 0, ceil: 0 };

    window.onload = () => { 
        // Ensure gate is visible
        document.getElementById('password-gate').style.display = 'flex';
        document.getElementById('main-content').style.display = 'none';
        
        if(localStorage.getItem('vvv2_auth') === SECRET) unlock(); 
    };

    function checkPassword() {
        if(document.getElementById('pass-input').value === SECRET) {
            localStorage.setItem('vvv2_auth', SECRET);
            unlock();
        } else { document.getElementById('pass-error').style.display = 'block'; }
    }

    function unlock() {
        document.getElementById('password-gate').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    function toggleMode() {
        currentMode *= -1;
        const btn = document.getElementById('toggle-mode');
        btn.className = 'mode-toggle ' + (currentMode === 1 ? 'active-plus' : 'active-minus');
        document.getElementById('mode-text').innerText = currentMode === 1 ? '加算モード' : '減算モード';
    }

    function updateVal(key) {
        values[key] = Math.max(0, values[key] + currentMode);
        document.getElementById('val-' + key).innerText = values[key];
        refreshLiveScore();
    }

    function refreshLiveScore() {
        let pts = values.ult*300 + values.r10*100 + values.d11*100 + values.d4*150 + values.d2*200 + values.direct*30;
        pts -= (values.drop_d*150 + values.drop_9*100 + values.short*50 + values.ceil*15);
        document.getElementById('live-pts').innerText = pts;
    }

    function judge() {
        const g = parseInt(document.getElementById('games').value) || 0;
        let pts = values.ult*300 + values.r10*100 + values.d11*100 + values.d4*150 + values.d2*200 + values.direct*30;
        pts -= (values.drop_d*150 + values.drop_9*100 + values.short*50 + values.ceil*15);

        // --- Strictly Conservative Logic ---
        // 1. Calculate Score Density (Points per Game)
        const density = pts / Math.max(1, g);
        const targetDensity = 0.35; // Target density for Setting 6 confidence

        // 2. Base Probability from Density
        let basePct = (density / targetDensity) * 60; // 0.35 density -> 60% baseline

        // 3. Confidence Factor based on Game Count
        // Low Game Count = Low Confidence.
        let confidence = Math.min(1.0, g / 6500); 
        
        // 4. Milestone Modulation
        let m = MILESTONES[0];
        for(let milestone of MILESTONES) if(g >= milestone.g) m = milestone;
        
        // Final Pct Calculation
        let pct = Math.floor(basePct * confidence + (pts > 1000 ? 30 : 0));
        
        // Shallow games limit
        if (g < 3000) pct = Math.min(pct, 65);
        if (g < 1500) pct = Math.min(pct, 45);

        // High pts bonus (must have game count too)
        if (pts > 1500 && g > 4000) pct = Math.max(pct, 90);
        else if (pts > 2000 && g > 5000) pct = 99;

        // Negative score limit
        if (pts <= 0) pct = Math.min(pct, 10);
        
        // Normalize range
        pct = Math.max(1, Math.min(99, pct));

        document.getElementById('result-panel').style.display = 'block';
        const disp = document.getElementById('res-pct');
        disp.innerText = pct + "%";
        disp.classList.remove('rainbow-text');
        
        if(pct >= 90) { disp.classList.add('rainbow-text'); document.getElementById('res-msg').innerText = 'PERFECT'; }
        else if(pct >= 70) { disp.style.color = 'var(--primary-red)'; document.getElementById('res-msg').innerText = 'HIGH CHANCE'; }
        else if(pct >= 40) { disp.style.color = '#ffcc00'; document.getElementById('res-msg').innerText = 'POSSIBLE'; }
        else { disp.style.color = 'var(--primary-blue)'; document.getElementById('res-msg').innerText = 'LOW EXPECTATION'; }
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function allReset() {
        if(!confirm('リセットしますか？')) return;
        Object.keys(values).forEach(k => { values[k]=0; document.getElementById('val-'+k).innerText=0; });
        document.getElementById('games').value = 0; document.getElementById('result-panel').style.display = 'none';
        refreshLiveScore();
    }
</script>
</body>
</html>
